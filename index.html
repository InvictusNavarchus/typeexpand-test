<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeExpand Test Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>TypeExpand Test Page</h1>
            <p class="subtitle">A comprehensive testing ground for writable HTML elements.</p>
        </header>

        <div class="grid">
            <div class="card">
                <h2>Standard Inputs</h2>
                <div class="input-group">
                    <label for="text">Text</label>
                    <input type="text" id="text" placeholder="Enter text...">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password...">
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter email...">
                </div>
                 <div class="input-group">
                    <label for="search">Search</label>
                    <input type="search" id="search" placeholder="Search...">
                </div>
            </div>

            <div class="card">
                <h2>Specialized Inputs</h2>
                <div class="input-group">
                    <label for="number">Number</label>
                    <input type="number" id="number" placeholder="Enter a number...">
                </div>
                <div class="input-group">
                    <label for="tel">Telephone</label>
                    <input type="tel" id="tel" placeholder="Enter phone number...">
                </div>
                <div class="input-group">
                    <label for="url">URL</label>
                    <input type="url" id="url" placeholder="https://example.com">
                </div>
            </div>

            <div class="card">
                <h2>Date/Time Inputs</h2>
                <div class="input-group">
                    <label for="date">Date</label>
                    <input type="date" id="date">
                </div>
                <div class="input-group">
                    <label for="datetime-local">Datetime Local</label>
                    <input type="datetime-local" id="datetime-local">
                </div>
                <div class="input-group">
                    <label for="month">Month</label>
                    <input type="month" id="month">
                </div>
                <div class="input-group">
                    <label for="week">Week</label>
                    <input type="week" id="week">
                </div>
                <div class="input-group">
                    <label for="time">Time</label>
                    <input type="time" id="time">
                </div>
            </div>

            <div class="card">
                <h2>Text Area</h2>
                <div class="input-group">
                    <label for="textarea">Textarea</label>
                    <textarea id="textarea" placeholder="Enter long text..."></textarea>
                </div>
            </div>

            <div class="card">
                <h2>Content Editable</h2>
                <div class="input-group">
                    <label>Simple Div</label>
                    <div contenteditable="true" data-placeholder="Type here..."></div>
                </div>
                <div class="input-group">
                    <label>Rich Text Simulation</label>
                    <div contenteditable="true" style="border: 1px solid #ccc; padding: 10px; min-height: 150px;">
                        <p>This is a paragraph. You can edit me.</p>
                        <ul>
                            <li>So is this list.</li>
                        </ul>
                        <p>Try typing <b>/time</b> here.</p>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h2>Iframe</h2>
                <div class="input-group">
                     <label>Iframe with editable body</label>
                     <iframe id="iframe" style="width: 100%; height: 150px; border: 1px solid var(--border-color);"></iframe>
                </div>
            </div>
        </div>
    </div>
    <div id="log"></div>

    <script src="script.js"></script>
</body>
</html>
